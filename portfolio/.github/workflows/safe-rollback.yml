# =============================================================
# SAFE ROLLBACK
# Two completely independent trigger paths:
#
# PATH A — push to main:
#   build job runs → on success, tag-on-push creates a snapshot tag.
#
# PATH B — manual dispatch:
#   tag-on-dispatch creates a snapshot tag of current HEAD.
#   If target_sha is provided, rollback job reverts to that SHA
#   non-destructively (revert commits, history preserved).
#
# ── DEPENDENCY ADVISORY ──────────────────────────────────────────────────
# This workflow uses the following pinned GitHub Actions:
#   - actions/checkout@v4
#   - oven-sh/setup-bun@v2
#
# Review and update these pins when:
#   1. Bun releases a new major version
#      → verify latest Bun remains compatible with your toolchain
#   2. You add a new package that requires a higher Bun minimum
#   3. actions/* release a new major version
#      → Review release notes for breaking changes before upgrading
# =============================================================
name: Safe Rollback

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'           # auto-readme-updater commits this
      - 'docs/CODEBASE_MAP.md' # update-codebase-map commits this
      - 'bun.lock'            # sync-lockfile commits this
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'SHA to roll back to (leave empty to just tag HEAD)'
        required: false
        default: ''
      reason:
        description: 'Reason for rollback'
        required: false
        default: 'Manual rollback via GitHub Actions'

concurrency:
  group: safe-rollback-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ── PATH A, step 1: build gate (push only) ────────────────────────────────
  build:
    name: Build gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Lint (advisory)
        run: bun run lint
        continue-on-error: true
      - name: Build
        run: bun run build
        env:
          CI: true
      - name: Job summary
        if: always()
        run: |
          set -euo pipefail
          echo "## Build gate" >> $GITHUB_STEP_SUMMARY
          echo "Result: \`${{ job.status }}\`" >> $GITHUB_STEP_SUMMARY

  # ── PATH A, step 2: tag on successful push build ──────────────────────────
  tag-on-push:
    name: Tag snapshot (post-push)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && needs.build.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Create snapshot tag
        run: |
          set -euo pipefail
          SHORT=$(git rev-parse --short HEAD)
          FULL=$(git rev-parse HEAD)
          TS=$(date -u +"%Y%m%dT%H%M%SZ")
          TAG="snapshot/${TS}-${SHORT}"
          git tag "$TAG" "$FULL" -m "Auto-snapshot: push build passed"
          git tag -f snapshot/latest "$FULL" -m "Latest known-good: $FULL"
          git push origin "$TAG"
          git push origin snapshot/latest --force
          echo "Tagged: $TAG"
          echo "## Snapshot created" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${SHORT}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| snapshot/latest | updated |" >> $GITHUB_STEP_SUMMARY
      - name: Job summary
        if: always()
        run: |
          set -euo pipefail
          echo "## Tag snapshot (post-push)" >> $GITHUB_STEP_SUMMARY
          echo "Result: \`${{ job.status }}\`" >> $GITHUB_STEP_SUMMARY

  # ── PATH B, step 1: tag on manual dispatch ────────────────────────────────
  tag-on-dispatch:
    name: Tag snapshot (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Create snapshot tag
        run: |
          set -euo pipefail
          SHORT=$(git rev-parse --short HEAD)
          FULL=$(git rev-parse HEAD)
          TS=$(date -u +"%Y%m%dT%H%M%SZ")
          TAG="snapshot/${TS}-${SHORT}"
          git tag "$TAG" "$FULL" -m "Manual snapshot dispatch by ${{ github.actor }}"
          git tag -f snapshot/latest "$FULL" -m "Latest known-good: $FULL"
          git push origin "$TAG"
          git push origin snapshot/latest --force
          echo "Tagged: $TAG"
          echo "## Manual snapshot created" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${SHORT}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
      - name: Job summary
        if: always()
        run: |
          set -euo pipefail
          echo "## Tag snapshot (manual)" >> $GITHUB_STEP_SUMMARY
          echo "Result: \`${{ job.status }}\`" >> $GITHUB_STEP_SUMMARY

  # ── PATH B, step 2: rollback (manual + target_sha provided) ──────────────
  rollback:
    name: Non-destructive rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target_sha != ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Validate target SHA
        id: val
        run: |
          set -euo pipefail
          TARGET="${{ github.event.inputs.target_sha }}"
          FULL=$(git rev-parse "${TARGET}" 2>/dev/null) || {
            echo "::error::SHA '${TARGET}' not found in repository history."
            exit 1
          }
          SHORT=$(git rev-parse --short "$FULL")
          echo "full=$FULL"   >> $GITHUB_OUTPUT
          echo "short=$SHORT" >> $GITHUB_OUTPUT
      - name: Perform revert
        run: |
          set -euo pipefail
          FULL="${{ steps.val.outputs.full }}"
          SHORT="${{ steps.val.outputs.short }}"
          CURRENT=$(git rev-parse HEAD)
          if [ "$CURRENT" = "$FULL" ]; then
            echo "::warning::Already at target SHA — nothing to revert."
            exit 0
          fi
          COMMITS=$(git log --reverse --pretty=format:"%H" "${FULL}"..HEAD)
          if [ -z "$COMMITS" ]; then
            echo "No commits to revert."
            exit 0
          fi
          while IFS= read -r c; do
            git revert --no-edit --no-commit "$c" || {
              git revert --abort 2>/dev/null || true
              echo "::error::Merge conflict at $c — rollback aborted. Resolve manually."
              exit 1
            }
          done <<< "$COMMITS"
          REASON="${{ github.event.inputs.reason }}"
          ACTOR="${{ github.actor }}"
          COMMIT_MSG=$(printf 'revert(rollback): restore state at %s\n\nTarget: %s (%s)\nReason: %s\nBy: %s\n\nNon-destructive — all history preserved.' "$SHORT" "$SHORT" "$FULL" "$REASON" "$ACTOR")
          git commit -m "$COMMIT_MSG"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin main; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to push rollback commit after 3 attempts."
              exit 1
            fi
          done
          echo "Rollback pushed."
          echo "## Rollback complete" >> $GITHUB_STEP_SUMMARY
          echo "| Rolled back to | \`${SHORT}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Full SHA | \`${FULL}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ github.event.inputs.reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
      - name: Job summary
        if: always()
        run: |
          set -euo pipefail
          echo "## Non-destructive rollback" >> $GITHUB_STEP_SUMMARY
          echo "Result: \`${{ job.status }}\`" >> $GITHUB_STEP_SUMMARY
