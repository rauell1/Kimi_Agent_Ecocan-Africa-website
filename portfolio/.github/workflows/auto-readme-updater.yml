# =============================================================
# AUTO README UPDATER
# Runs on every push to main (excluding README.md and
# lockfile-only changes) and on manual dispatch.
#
# Updates the <!-- AUTO-UPDATED:START/END --> block in README.md
# with live repo stats (commit info, file counts, workflow badges).
#
# ── DEPENDENCY ADVISORY ──────────────────────────────────────
# This workflow uses the following pinned GitHub Actions:
#   - actions/checkout@v4
#   - actions/setup-node@v4  (node-version: '20')
#
# Review and update these pins when:
#   1. A new LTS Node.js version is released (currently 24, next: 26 ~Oct 2027)
#      → Update node-version once 26 enters Active LTS
#   2. actions/checkout or actions/setup-node release a new major version
#      → Review release notes before bumping
#
# NOTE: This workflow does NOT run `npm ci` — it only reads
# package.json via `node -p`. No cache is needed.
# =============================================================
name: Auto README Updater

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'package-lock.json'   # legacy npm lockfile (if ever reintroduced)
      - 'bun.lock'            # sync-lockfile commits this; no readme update needed
  workflow_dispatch:

# Prevent parallel runs from racing on the README commit.
# cancel-in-progress: false ensures the queued run still executes
# (we want every push eventually reflected, not skipped).
concurrency:
  group: maintenance-auto-commits-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-readme:
    name: Build and splice README block
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # No `cache: npm` here — this workflow never runs npm ci.
      # node -p only reads package.json; node_modules are not needed.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build and splice README block
        run: |
          set -euo pipefail

          SHA=$(git rev-parse --short HEAD)
          MSG=$(git log -1 --pretty=format:"%s")
          DATE=$(git log -1 --pretty=format:"%cd" --date=format:"%Y-%m-%d %H:%M UTC")
          AUTHOR=$(git log -1 --pretty=format:"%an")
          TOTAL=$(git rev-list --count HEAD)
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          VER=$(node -p "require('./package.json').version" 2>/dev/null || echo 'n/a')
          REPO="rauell1/portfolio"

          # Sentinel strings stored in variables to avoid YAML scanner issues
          # with angle-bracket tokens inside run blocks.
          SENTINEL_START='<!-- AUTO-UPDATED:START -->'
          SENTINEL_END='<!-- AUTO-UPDATED:END -->'

          # -----------------------------------------------------------------
          # Safe file counts: guard every find with a directory existence check.
          # `find a b c` with set -e exits 1 when any path is missing.
          # Always use a single directory per find call + `|| echo '0'` fallback.
          # -----------------------------------------------------------------

          TS=$(find src \( -name '*.ts' -o -name '*.tsx' \) 2>/dev/null | wc -l | tr -d ' ' || echo '0')
          CSS=$(find src -name '*.css' 2>/dev/null | wc -l | tr -d ' ' || echo '0')

          if [ -d src/components ]; then
            COMP=$(find src/components -name '*.tsx' 2>/dev/null | wc -l | tr -d ' ' || echo '0')
          else
            COMP=0
          fi

          PAGES=0
          for dir in src/pages src/views src/app; do
            if [ -d "$dir" ]; then
              COUNT=$(find "$dir" -name '*.tsx' 2>/dev/null | wc -l | tr -d ' ' || echo '0')
              PAGES=$((PAGES + COUNT))
            fi
          done

          BLOCK_FILE="/tmp/readme_block.md"
          rm -f "$BLOCK_FILE"

          printf '%s\n' "$SENTINEL_START"                                                                                                   >> "$BLOCK_FILE"
          printf '%s\n' "> ⚡ **This section is auto-generated by the [Auto README Updater](.github/workflows/auto-readme-updater.yml) on every push to \`main\`.**" >> "$BLOCK_FILE"
          printf '\n'                                                                                                                        >> "$BLOCK_FILE"
          printf '%s\n' "## 🔋 Repo Snapshot"                                                                                              >> "$BLOCK_FILE"
          printf '\n'                                                                                                                        >> "$BLOCK_FILE"
          printf '%s\n' "| Field | Value |"                                                                                                 >> "$BLOCK_FILE"
          printf '%s\n' "|---|---|"                                                                                                          >> "$BLOCK_FILE"
          printf '| **Last commit** | `%s` — %s |\n'   "$SHA"    "$MSG"    >> "$BLOCK_FILE"
          printf '| **Committed by** | %s |\n'          "$AUTHOR"           >> "$BLOCK_FILE"
          printf '| **Commit date** | %s |\n'           "$DATE"             >> "$BLOCK_FILE"
          printf '| **Branch** | `%s` |\n'              "$BRANCH"           >> "$BLOCK_FILE"
          printf '| **Total commits** | %s |\n'         "$TOTAL"            >> "$BLOCK_FILE"
          printf '| **Package version** | `%s` |\n'     "$VER"              >> "$BLOCK_FILE"
          printf '| **TypeScript files** | %s |\n'      "$TS"               >> "$BLOCK_FILE"
          printf '| **CSS files** | %s |\n'             "$CSS"              >> "$BLOCK_FILE"
          printf '| **React components** | %s |\n'      "$COMP"             >> "$BLOCK_FILE"
          printf '| **Pages / views** | %s |\n'         "$PAGES"            >> "$BLOCK_FILE"
          printf '\n'                                                                                                                        >> "$BLOCK_FILE"
          printf '%s\n' "## 🤗 Workflow Status"                                                                                            >> "$BLOCK_FILE"
          printf '\n'                                                                                                                        >> "$BLOCK_FILE"
          printf '![README](https://github.com/%s/actions/workflows/auto-readme-updater.yml/badge.svg)  '  "$REPO"  >> "$BLOCK_FILE"
          printf '![Rollback](https://github.com/%s/actions/workflows/safe-rollback.yml/badge.svg)  '      "$REPO"  >> "$BLOCK_FILE"
          printf '![Guard](https://github.com/%s/actions/workflows/workflow-guard.yml/badge.svg)  '        "$REPO"  >> "$BLOCK_FILE"
          printf '![Sync](https://github.com/%s/actions/workflows/sync-lockfile.yml/badge.svg)\n'          "$REPO"  >> "$BLOCK_FILE"
          printf '%s\n' "$SENTINEL_END"                                                                                                     >> "$BLOCK_FILE"

          echo "=== Block preview ==="
          cat "$BLOCK_FILE"

          README="README.md"
          if ! grep -qF "$SENTINEL_START" "$README"; then
            printf '\n---\n\n' >> "$README"
            cat "$BLOCK_FILE" >> "$README"
            echo "Sentinels missing — appended block."
          else
            awk -v block="$BLOCK_FILE" -v start="$SENTINEL_START" -v end="$SENTINEL_END" '
              $0 == start { skip=1; while ((getline line < block) > 0) print line; close(block); next }
              $0 == end   { skip=0; next }
              !skip        { print }
            ' "$README" > /tmp/readme_new.md
            mv /tmp/readme_new.md "$README"
            echo "Sentinel block replaced via awk."
          fi

      - name: Commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet README.md; then
            echo "README unchanged."
            exit 0
          fi
          git add README.md
          git commit -m "docs(auto): update README snapshot [skip ci]"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin main; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to push README update after 3 attempts."
              exit 1
            fi
          done
          echo "README updated and pushed."
      - name: Job summary
        if: always()
        run: |
          set -euo pipefail
          echo "## Auto README Updater" >> $GITHUB_STEP_SUMMARY
          echo "Result: \`${{ job.status }}\`" >> $GITHUB_STEP_SUMMARY
